name: Build & Push to 共绩算力 Harbor

on:
  push:
    branches: [main, master, release]
    paths-ignore: ['**.md']
  workflow_dispatch:

env:
  REGISTRY: harborpush.suanleme.cn
  NAMESPACE: wangduoduo2026

jobs:
  build-tts:
    name: Build & Push app-tts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Generate tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME}-$(date +%Y%m%d%H%M%S)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push app-tts
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./app-tts/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/app-tts:${{ steps.tags.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/app-tts:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
